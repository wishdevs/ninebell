# 배포 파이프라인 — build(러너에서 1회) → registry push → deploy(서버는 pull만).
# 서버에선 빌드하지 않는다. 상세 셋업: deploy/README.md
stages: [diagnose, build, deploy]

variables:
  BACKEND_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  TAG: "$CI_COMMIT_SHORT_SHA"

# ══════════ [임시] DIND 진단 — dockerd 가 실제로 뜨는지/왜 안 뜨는지 확정 ══════════
# 4번의 빌드 실패에서 "Cannot connect to the Docker daemon"(TLS 2376·평문 2375 둘 다) 확인 →
# dind 데몬 자체가 안 올라오는 것으로 보임(초기 registry HTTP/HTTPS 에러는 docker login CLI 단계라
# 데몬 문제를 가렸음). 이 잡이 DNS/인증서/포트리슨/데몬연결을 한 번에 드러낸다. 원인 확정 후 삭제.
diagnose:dind:
  stage: diagnose
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--insecure-registry=192.168.50.61:5050"]
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  script:
    - 'echo "== ENV: DOCKER_HOST=$DOCKER_HOST CERTDIR=$DOCKER_TLS_CERTDIR CERT_PATH=$DOCKER_CERT_PATH"'
    - echo "== /etc/hosts =="; cat /etc/hosts
    - echo "== DNS(docker resolve) =="; nslookup docker 2>&1 || echo "resolve 실패"
    - echo "== 인증서 공유(/certs) =="; ls -la /certs 2>&1 || echo "/certs 없음"; ls -la /certs/client 2>&1 || echo "/certs/client 없음"
    - echo "== 포트 리슨(2376/2375) — 데몬이 TCP 를 여는지 =="; for p in 2376 2375; do nc -z -w2 docker $p && echo "port $p OPEN" || echo "port $p CLOSED"; done
    - echo "== docker version(client/server) =="; docker version || true
    - |
      echo "== 데몬 대기 40s + info(에러 미숨김) =="
      ok=""
      for i in $(seq 1 20); do
        if docker info >/tmp/i 2>/tmp/e; then echo "[OK i=$i] 데몬 연결됨"; ok=1; break; fi
        echo "[$i] $(head -1 /tmp/e 2>/dev/null)"; sleep 2
      done
      echo "== 최종 info 에러 전문 =="; cat /tmp/e 2>/dev/null || true
      echo "== insecure-registry 반영 =="; docker info 2>/dev/null | grep -iA3 "Insecure Registries" || echo "미확인(연결실패/미반영)"
      if [ -n "$ok" ]; then echo "결론: 데몬 OK — 문제는 레지스트리/인증 단계"; else echo "결론: 데몬 연결 실패 — 러너 privileged/dind 셋업 의심"; fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ══════════ BUILD (CI 러너 dind → GitLab Container Registry) ══════════
.build:
  image: docker:27
  services:
    # 내부 레지스트리(192.168.50.61:5050)가 HTTP(no TLS) → dind 데몬에 insecure-registry 등록.
    # 클라이언트↔dind 는 GitLab 기본 TLS(/certs, 2376) 유지. 평문(2375)으로 바꾸면 dind
    # 엔트리포인트가 tcp 호스트를 안 열어 "Cannot connect to the Docker daemon" 이 난다(이전 실패 원인).
    - name: docker:27-dind
      command: ["--insecure-registry=192.168.50.61:5050"]
  variables:
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    # 진단: dind 에 insecure-registry 가 실제 적용됐는지(192.168.50.61:5050 나오면 적용됨).
    - docker info 2>/dev/null | grep -iA3 "Insecure Registries" || echo "[[no-insecure-in-daemon]]"
    # HTTP 레지스트리라 docker login(HTTPS 강제) 이 실패 → 로그인 생략, config.json 에 인증 직접(push 는 insecure HTTP).
    - mkdir -p "$HOME/.docker"
    - |
      AUTH=$(printf '%s' "$CI_REGISTRY_USER:$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')
      printf '{"auths":{"%s":{"auth":"%s"}}}' "$CI_REGISTRY" "$AUTH" > "$HOME/.docker/config.json"
  rules:
    # [임시] 진단 중 — 빌드는 수동으로 내려 노이즈/비용 방지. 진단 후 auto 로 되돌린다.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

build:backend:
  extends: .build
  stage: build
  script:
    - docker build -f backend/Dockerfile -t "$BACKEND_IMAGE:$TAG" -t "$BACKEND_IMAGE:latest" backend
    - docker push "$BACKEND_IMAGE:$TAG"
    - docker push "$BACKEND_IMAGE:latest"

build:frontend:
  extends: .build
  stage: build
  script:
    # ⚠ NEXT_PUBLIC_API_BASE 는 빌드타임에 번들에 구움 → 프록시 same-origin '/api'.
    - docker build --build-arg NEXT_PUBLIC_API_BASE=/api -t "$FRONTEND_IMAGE:$TAG" -t "$FRONTEND_IMAGE:latest" .
    - docker push "$FRONTEND_IMAGE:$TAG"
    - docker push "$FRONTEND_IMAGE:latest"

# ══════════ DEPLOY (서버 SSH → 프리빌드 이미지 pull + up) ══════════
# 서버가 private 레지스트리에서 pull 하려면 read_registry Deploy Token 필요
# (GitLab → Settings → Repository → Deploy tokens, scope=read_registry).
# → CI/CD 변수: REGISTRY_DEPLOY_USER / REGISTRY_DEPLOY_TOKEN.
# SSH: DEPLOY_SSH_KEY(개인키, masked·protected) / DEPLOY_USER / API_HOST / DB_HOST / FRONT_HOST.
.deploy:
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$API_HOST" "$FRONT_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual # 초안: 수동 승인 버튼. 자동배포하려면 when 줄 제거.

# api: entrypoint 가 `alembic upgrade head` 후 uvicorn → 배포 시 마이그레이션 자동.
deploy:api:
  extends: .deploy
  stage: deploy
  script:
    - rsync -az deploy/api/docker-compose.yml "$DEPLOY_USER@$API_HOST:/opt/ninebell/api/docker-compose.yml"
    - |
      ssh "$DEPLOY_USER@$API_HOST" "
        set -e
        cd /opt/ninebell/api
        docker login -u '$REGISTRY_DEPLOY_USER' -p '$REGISTRY_DEPLOY_TOKEN' '$CI_REGISTRY'
        BACKEND_IMAGE='$BACKEND_IMAGE:$TAG' docker compose pull
        BACKEND_IMAGE='$BACKEND_IMAGE:$TAG' docker compose up -d
        docker image prune -f
      "

deploy:frontend:
  extends: .deploy
  stage: deploy
  script:
    - rsync -az deploy/front/docker-compose.yml deploy/front/Caddyfile "$DEPLOY_USER@$FRONT_HOST:/opt/ninebell/front/"
    - |
      ssh "$DEPLOY_USER@$FRONT_HOST" "
        set -e
        cd /opt/ninebell/front
        docker login -u '$REGISTRY_DEPLOY_USER' -p '$REGISTRY_DEPLOY_TOKEN' '$CI_REGISTRY'
        FRONTEND_IMAGE='$FRONTEND_IMAGE:$TAG' docker compose pull
        FRONTEND_IMAGE='$FRONTEND_IMAGE:$TAG' docker compose up -d
        docker image prune -f
      "
# db(172.20.50.51)는 스테이트풀이라 CI 배포 대상 아님 — 최초 1회 수동 셋업(deploy/README.md).
