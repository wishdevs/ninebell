[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
pythonpath = .
filterwarnings =
    ignore::DeprecationWarning
    # FastAPI 0.115.6 + pydantic 2.13.4 는 alias 를 가진 요청 바디 필드에 대해
    # 검증 시 UnsupportedFieldAttributeWarning 을 1회(위치 기준 dedupe) 발생시킨다.
    # 기능에는 영향 없는 버전 상호작용 이슈 — 로그 노이즈만 억제한다.
    ignore::pydantic.warnings.UnsupportedFieldAttributeWarning
